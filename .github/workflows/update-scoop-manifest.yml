name: Update Scoop manifest

# Живе в репозиторії scoop-bucket і обслуговує всі застосунки одразу.
#
# Схема роботи:
#   1. Отримує подію 'update-{appname}' від репозиторію застосунку
#   2. Перевіряє що URL доступний і SHA256 збігається
#   3. Оновлює маніфест bucket/{app}.json і пушить напряму в main
#   4. CI перевіряє структуру маніфесту; при помилці — автоматично робить revert
#
# Щоб додати новий застосунок — достатньо покласти його маніфест у bucket/.

on:
  repository_dispatch:
    types:
      - update-*

  workflow_dispatch:
    inputs:
      app:
        description: 'App id (lowercase, наприклад: browserselector)'
        required: true
      version:
        description: 'Version (without v prefix, наприклад: 1.2.3)'
        required: true
      hash:
        description: 'SHA256 hash'
        required: true
      url:
        description: 'Download URL'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    # Нормалізуємо вхідні дані через env — безпечна альтернатива
    # прямій інтерполяції ${{ }} у run-блоках (захист від ін'єкцій)
    env:
      APP:     ${{ github.event.client_payload.app     || github.event.inputs.app }}
      VERSION: ${{ github.event.client_payload.version || github.event.inputs.version }}
      HASH:    ${{ github.event.client_payload.hash    || github.event.inputs.hash }}
      URL:     ${{ github.event.client_payload.url     || github.event.inputs.url }}

    steps:
      - name: Checkout bucket
        uses: actions/checkout@v4

      - name: Check manifest exists
        run: |
          MANIFEST="bucket/$APP.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "ERROR: Manifest '$MANIFEST' not found in bucket/"
            exit 1
          fi
          echo "Found: $MANIFEST"

      # Завантажуємо файл і порівнюємо SHA256 до того як щось змінювати.
      # Якщо URL недоступний або хеш не збігається — одразу падаємо з помилкою.
      - name: Verify URL and hash
        run: |
          TEMP=$(mktemp)
          echo "Downloading: $URL"

          HTTP_CODE=$(curl -fsSL --write-out "%{http_code}" -o "$TEMP" "$URL")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Download failed (HTTP $HTTP_CODE)"
            exit 1
          fi

          ACTUAL_HASH=$(sha256sum "$TEMP" | awk '{print $1}')
          EXPECTED_HASH=$(echo "$HASH" | tr '[:upper:]' '[:lower:]')
          ACTUAL_HASH=$(echo "$ACTUAL_HASH" | tr '[:upper:]' '[:lower:]')

          if [ "$ACTUAL_HASH" != "$EXPECTED_HASH" ]; then
            echo "ERROR: Hash mismatch!"
            echo "  Expected: $EXPECTED_HASH"
            echo "  Actual:   $ACTUAL_HASH"
            exit 1
          fi

          echo "✓ Hash verified: $ACTUAL_HASH"

      - name: Update manifest
        run: |
          MANIFEST="bucket/$APP.json"

          jq --arg version "$VERSION" \
             --arg hash    "$HASH" \
             --arg url     "$URL" \
             '.version = $version |
              .architecture."64bit".url  = $url |
              .architecture."64bit".hash = $hash' \
             "$MANIFEST" > "$MANIFEST.tmp"

          mv "$MANIFEST.tmp" "$MANIFEST"

          echo "Updated manifest:"
          cat "$MANIFEST"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "bucket/$APP.json"

          if git diff --staged --quiet; then
            echo "No changes — manifest is already at version $VERSION"
            exit 0
          fi

          git commit -m "Update $APP to $VERSION"
          git push origin main
