name: Update Scoop manifest

# Цей workflow живе в репозиторії scoop-bucket і є універсальним —
# він обслуговує всі застосунки одразу.
#
# Схема роботи:
#   1. Отримує подію 'update-{appname}' від репозиторію застосунку
#   2. Створює окрему гілку update/{app}-{version}
#   3. Оновлює маніфест bucket/{app}.json у цій гілці
#   4. Відкриває Pull Request в main
#   5. CI автоматично перевіряє маніфест у PR
#   6. Після успішної перевірки PR можна змержити вручну або автоматично
#
# Щоб додати новий застосунок — достатньо покласти його маніфест у папку bucket/,
# workflow вже готовий і нічого змінювати не треба.

on:
  # Автоматичний запуск: приймаємо події від будь-якого застосунку.
  # Патерн 'update-*' покриває update-browserselector, update-myapp тощо.
  repository_dispatch:
    types:
      - update-*

  # Ручний запуск через інтерфейс GitHub Actions
  workflow_dispatch:
    inputs:
      app:
        description: 'App id (lowercase, наприклад: browserselector)'
        required: true
      version:
        description: 'Version (without v prefix, наприклад: 1.2.3)'
        required: true
      hash:
        description: 'SHA256 hash'
        required: true
      url:
        description: 'Download URL'
        required: true

permissions:
  contents: write      # Потрібно для створення гілки і пушу
  pull-requests: write # Потрібно для відкриття Pull Request

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      # Крок 1: Клонуємо репозиторій scoop-bucket
      - name: Checkout bucket
        uses: actions/checkout@v4

      # Крок 2: Нормалізуємо вхідні дані — визначаємо звідки прийшов запуск
      # і записуємо всі параметри в outputs для наступних кроків
      - name: Get payload
        id: payload
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Автоматичний запуск: беремо дані з client_payload події
            echo "APP=${{ github.event.client_payload.app }}" >> $GITHUB_OUTPUT
            echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "HASH=${{ github.event.client_payload.hash }}" >> $GITHUB_OUTPUT
            echo "URL=${{ github.event.client_payload.url }}" >> $GITHUB_OUTPUT
          else
            # Ручний запуск: беремо дані з полів форми workflow_dispatch
            echo "APP=${{ github.event.inputs.app }}" >> $GITHUB_OUTPUT
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "HASH=${{ github.event.inputs.hash }}" >> $GITHUB_OUTPUT
            echo "URL=${{ github.event.inputs.url }}" >> $GITHUB_OUTPUT
          fi

      # Крок 3: Перевіряємо що маніфест для цього застосунку існує у bucket/.
      # Якщо файл не знайдено — завершуємо з помилкою і зрозумілим повідомленням.
      - name: Check manifest exists
        run: |
          MANIFEST="bucket/${{ steps.payload.outputs.APP }}.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "ERROR: Manifest file '$MANIFEST' not found!"
            echo "Make sure the file exists in the bucket/ directory."
            exit 1
          fi
          echo "Manifest found: $MANIFEST"

      # Крок 4: Створюємо окрему гілку для змін.
      # Назва гілки: update/{app}-{version}, наприклад: update/browserselector-1.2.3
      # Це дозволяє CI перевірити зміни до того як вони потраплять в main.
      - name: Create update branch
        id: branch
        run: |
          BRANCH="update/${{ steps.payload.outputs.APP }}-${{ steps.payload.outputs.VERSION }}"
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Створюємо нову гілку від main
          git checkout -b "$BRANCH"
          echo "Created branch: $BRANCH"

      # Крок 5: Оновлюємо JSON-маніфест пакету за допомогою jq.
      # Шлях до файлу формується динамічно: bucket/{app}.json —
      # саме тому для нового застосунку не потрібно чіпати цей workflow.
      - name: Update manifest
        run: |
          APP="${{ steps.payload.outputs.APP }}"
          VERSION="${{ steps.payload.outputs.VERSION }}"
          HASH="${{ steps.payload.outputs.HASH }}"
          URL="${{ steps.payload.outputs.URL }}"
          MANIFEST="bucket/$APP.json"
          
          echo "Updating $MANIFEST to version $VERSION"
          
          # Оновлюємо три поля у JSON-маніфесті:
          #   .version                   — номер версії пакету
          #   .architecture."64bit".url  — посилання для завантаження
          #   .architecture."64bit".hash — SHA256-хеш для перевірки цілісності
          jq --arg version "$VERSION" \
             --arg hash "$HASH" \
             --arg url "$URL" \
             '.version = $version |
              .architecture."64bit".url = $url |
              .architecture."64bit".hash = $hash' \
             "$MANIFEST" > "$MANIFEST.tmp"
          
          # Замінюємо оригінальний файл оновленим
          # (jq не може писати безпосередньо в той самий файл)
          mv "$MANIFEST.tmp" "$MANIFEST"
          
          echo "Updated manifest:"
          cat "$MANIFEST"

      # Крок 6: Комітимо зміни і пушимо гілку у репозиторій
      - name: Commit and push branch
        id: commit
        run: |
          git add "bucket/${{ steps.payload.outputs.APP }}.json"
          
          # Перевіряємо чи є реальні зміни
          if git diff --staged --quiet; then
            echo "No changes to commit — manifest is already up to date"
            echo "CHANGED=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          git commit -m "Update ${{ steps.payload.outputs.APP }} to ${{ steps.payload.outputs.VERSION }}"
          git push origin "${{ steps.branch.outputs.BRANCH }}"
          echo "CHANGED=true" >> $GITHUB_OUTPUT

      # Крок 7: Відкриваємо Pull Request з гілки update/{app}-{version} в main.
      # CI запуститься автоматично на цьому PR і перевірить маніфест.
      # Після успішної перевірки PR можна змержити.
      #
      # Використовуємо gh pr create замість peter-evans/create-pull-request:
      # на відміну від тієї дії, gh pr create просто відкриває PR для вже
      # існуючої запушеної гілки і не чіпає working directory.
      - name: Open Pull Request
        if: steps.commit.outputs.CHANGED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.BRANCH }}" \
            --title "Update ${{ steps.payload.outputs.APP }} to ${{ steps.payload.outputs.VERSION }}" \
            --body "Automated manifest update for **${{ steps.payload.outputs.APP }}**.

| Field   | Value |
|---------|-------|
| Version | \`${{ steps.payload.outputs.VERSION }}\` |
| URL     | ${{ steps.payload.outputs.URL }} |
| SHA256  | \`${{ steps.payload.outputs.HASH }}\` |

CI буде автоматично перевірено після відкриття PR."
