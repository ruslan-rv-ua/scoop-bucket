name: CI

on:
  push:
    paths:
      - 'bucket/*.json'

permissions:
  contents: write  # Потрібно для revert коміту при провалі перевірки

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Встановлюємо Scoop для перевірки структури маніфестів
      - name: Install Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression

      # Перевіряємо синтаксис JSON і структуру маніфестів через scoop info.
      # Окрема перевірка JSON не потрібна — scoop info однаково впаде при невалідному JSON,
      # але з менш читабельним повідомленням, тому перевіряємо JSON першим.
      - name: Validate manifests
        shell: pwsh
        run: |
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "User") + ";" + $env:PATH

          # scoop bucket add не підтримує локальні шляхи — копіюємо вручну
          $scoopBucketPath = "$env:USERPROFILE\scoop\buckets\local"
          New-Item -ItemType Directory -Force -Path $scoopBucketPath | Out-Null
          Copy-Item -Path "$PWD\bucket" -Destination "$scoopBucketPath\bucket" -Recurse -Force

          $hasErrors = $false

          Get-ChildItem bucket/*.json | ForEach-Object {
            $name = $_.BaseName
            Write-Host "`nValidating: $name"

            # Перевірка синтаксису JSON
            try {
              $manifest = Get-Content $_.FullName -Raw | ConvertFrom-Json
              Write-Host "  ✓ Valid JSON"
            } catch {
              Write-Host "  ✗ Invalid JSON: $_" -ForegroundColor Red
              $hasErrors = $true
              return
            }

            # Перевірка структури маніфесту через scoop
            $info = scoop info "local/$name" 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "  ✓ Valid manifest structure" -ForegroundColor Green
              Write-Host "    Version:  $($manifest.version)"
              Write-Host "    Homepage: $($manifest.homepage)"
            } else {
              Write-Host "  ✗ Invalid manifest: $info" -ForegroundColor Red
              $hasErrors = $true
            }
          }

          if ($hasErrors) {
            exit 1
          }

          Write-Host "`n✓ All manifests validated successfully!" -ForegroundColor Green

  # Якщо validate впав — робимо revert останнього коміту в main.
  # Це захищає користувачів від встановлення маніфесту з невалідною структурою.
  revert-on-failure:
    needs: validate
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Потрібно щоб git revert мав доступ до батьківського коміту

      - name: Revert last commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMMIT=$(git rev-parse HEAD)
          echo "Reverting commit: $COMMIT"

          git revert --no-edit HEAD
          git push origin main

          echo "✓ Reverted. Check the validation log for details."
