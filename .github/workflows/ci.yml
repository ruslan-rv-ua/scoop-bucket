name: CI

on:
  push:
    paths:
      - 'bucket/*.json'
  pull_request:
    paths:
      - 'bucket/*.json'

permissions:
  contents: write       # Потрібно для автомержу
  pull-requests: write  # Потрібно для автомержу

jobs:
  validate:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Крок 1: Перевіряємо синтаксис JSON у всіх маніфестах
      - name: Validate JSON syntax
        shell: pwsh
        run: |
          $hasErrors = $false
          
          Get-ChildItem bucket/*.json | ForEach-Object {
            $name = $_.Name
            Write-Host "Validating: $name"
            
            try {
              $content = Get-Content $_.FullName -Raw
              $null = $content | ConvertFrom-Json
              Write-Host "  ✓ Valid JSON syntax" -ForegroundColor Green
            } catch {
              Write-Host "  ✗ Invalid JSON: $_" -ForegroundColor Red
              $hasErrors = $true
            }
          }
          
          if ($hasErrors) {
            exit 1
          }

      # Крок 2: Встановлюємо Scoop щоб перевірити структуру маніфестів
      - name: Install Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression

      # Крок 3: Перевіряємо структуру маніфестів через сам Scoop
      - name: Validate manifests with Scoop
        shell: pwsh
        run: |
          # Перезавантажуємо PATH щоб Scoop встановлений у попередньому кроці був доступний
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "User") + ";" + $env:PATH

          # Додаємо поточну директорію як локальний bucket
          scoop bucket add local $PWD
          
          $hasErrors = $false
          
          Get-ChildItem bucket/*.json | ForEach-Object {
            $name = $_.BaseName
            Write-Host "`nValidating manifest: $name"
            
            # scoop info перевіряє структуру маніфесту
            $info = scoop info $name 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "  ✓ Valid manifest structure" -ForegroundColor Green
              
              # Виводимо ключову інформацію з маніфесту для логу
              $manifest = Get-Content $_.FullName | ConvertFrom-Json
              Write-Host "    Version: $($manifest.version)"
              Write-Host "    Homepage: $($manifest.homepage)"
            } else {
              Write-Host "  ✗ Invalid manifest: $info" -ForegroundColor Red
              $hasErrors = $true
            }
          }
          
          if ($hasErrors) {
            exit 1
          }
          
          Write-Host "`n✓ All manifests validated successfully!" -ForegroundColor Green

  # Окремий job для автомержу — запускається тільки для PR,
  # тільки якщо PR відкритий ботом (автоматичне оновлення),
  # і тільки після успішного проходження validate.
  auto-merge:
    needs: validate           # Чекаємо поки validate успішно завершиться
    if: |
      github.event_name == 'pull_request' &&
      github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    
    steps:
      # Автоматично мержимо PR якщо він відкритий ботом і CI пройшов
      - name: Auto-merge bot PR
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash  # squash — один чистий коміт замість merge commit
