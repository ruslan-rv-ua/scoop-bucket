# ─────────────────────────────────────────────────────────────────────────────
# update-quick-snippets.yml — Auto-update quick-snippets Scoop manifest
# ─────────────────────────────────────────────────────────────────────────────
#
# TRIGGERS
#   • repository_dispatch  — fired by quick-snippets repo's notify-scoop-bucket
#     workflow after a new release is published.
#     Event type: `quick-snippets-released`
#     Payload:    { "version": "x.y.z" }
#
#   • workflow_dispatch    — manual trigger from GitHub UI.
#     Optional `version` input; leave empty to auto-detect latest release.
#
# LOGIC
#   1. Determine version from dispatch payload / manual input / GitHub API
#   2. Download the pre-computed .sha256 checksum file (NOT the full ZIP)
#   3. Parse the hash from shasum-compatible format: "{hash}  {filename}"
#   4. Update version + hash in bucket/quick-snippets.json
#   5. Commit and push to main
#
# SECRETS REQUIRED
#   BUCKET_REPO_PAT — GitHub PAT (classic) with `repo` scope, used to push
#                     commits to this repository.
# ─────────────────────────────────────────────────────────────────────────────

name: Update quick-snippets manifest

on:
  repository_dispatch:
    types: [quick-snippets-released]
  workflow_dispatch:
    inputs:
      version:
        description: >
          Version to update to (e.g. 1.2.3, without "v" prefix).
          Leave empty to auto-detect the latest release from GitHub.
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  update:
    name: Update quick-snippets manifest
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout bucket repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUCKET_REPO_PAT }}

      # ── 2. Determine version ─────────────────────────────────────────────────
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          # Priority: dispatch payload > workflow_dispatch input > GitHub API
          $version = ''

          if ('${{ github.event_name }}' -eq 'repository_dispatch') {
            $version = '${{ github.event.client_payload.version }}'.Trim()
            Write-Host "Version from repository_dispatch payload: $version"
          }

          if (-not $version -and '${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'.Trim()
            if ($version) {
              Write-Host "Version from workflow_dispatch input: $version"
            }
          }

          if (-not $version) {
            Write-Host 'No version provided — querying GitHub Releases API...'
            $release = Invoke-RestMethod `
              -Uri 'https://api.github.com/repos/ruslan-rv-ua/quick-snippets/releases/latest' `
              -Headers @{ Accept = 'application/vnd.github+json' }
            $version = $release.tag_name -replace '^v', ''
            Write-Host "Latest release version: $version"
          }

          if (-not $version) {
            Write-Error 'Could not determine version'
            exit 1
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── 3. Download and parse SHA-256 checksum ───────────────────────────────
      # The .sha256 file format is: "{hash}  {filename}" (two spaces, shasum-compatible)
      # We parse the hash without downloading the full ZIP.
      - name: Fetch SHA-256 hash from release asset
        id: hash
        shell: pwsh
        run: |
          $version      = '${{ steps.version.outputs.VERSION }}'
          $checksumUrl   = "https://github.com/ruslan-rv-ua/quick-snippets/releases/download/v${version}/quick-snippets-windows-x64-v${version}.zip.sha256"

          Write-Host "Downloading checksum from: $checksumUrl"
          $checksumContent = Invoke-RestMethod -Uri $checksumUrl

          # Parse: first token before whitespace is the hex hash
          $hash = ($checksumContent -split '\s+')[0].Trim().ToLower()

          if ($hash.Length -ne 64) {
            Write-Error "Unexpected hash length ($($hash.Length)): $hash"
            exit 1
          }

          Write-Host "SHA-256: $hash"
          "HASH=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── 4. Update manifest ───────────────────────────────────────────────────
      - name: Update bucket/quick-snippets.json
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.VERSION }}'
          $hash    = '${{ steps.hash.outputs.HASH }}'
          $url     = "https://github.com/ruslan-rv-ua/quick-snippets/releases/download/v${version}/quick-snippets-windows-x64-v${version}.zip"

          $manifestPath = 'bucket/quick-snippets.json'
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json

          $manifest.version                    = $version
          $manifest.architecture.'64bit'.url   = $url
          $manifest.architecture.'64bit'.hash  = $hash

          $manifest | ConvertTo-Json -Depth 10 | Set-Content $manifestPath -Encoding utf8

          Write-Host "Updated manifest to v${version}"
          Write-Host "  URL:  $url"
          Write-Host "  Hash: $hash"

      # ── 5. Commit and push ───────────────────────────────────────────────────
      - name: Commit and push changes
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.VERSION }}'

          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git add bucket/quick-snippets.json

          $diff = git diff --staged --quiet 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host 'Manifest already up to date — nothing to commit'
          } else {
            git commit -m "chore: update quick-snippets to v${version}"
            git push
            Write-Host "Pushed manifest update for v${version}"
          }
